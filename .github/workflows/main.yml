name: Build for Android ARMv7
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Download source
        run: |
          wget https://raw.githubusercontent.com/rstagit/rstaspoof/refs/heads/main/rstaspoof.go
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      
      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          link-to-sdk: true
      
      - name: Find NDK Clang Path
        run: |
          # Find the correct clang binary
          NDK_PATH=$ANDROID_HOME/ndk-bundle
          CLANG_PATH=$(find $NDK_PATH -name "armv7a-linux-androideabi*-clang" | head -n 1)
          echo "Found clang at: $CLANG_PATH"
          echo "NDK_CLANG=$CLANG_PATH" >> $GITHUB_ENV
      
      - name: Build Static Binary (CGO Disabled - Simpler)
        run: |
          # This is the simpler approach without CGO
          CGO_ENABLED=0 \
          GOOS=android \
          GOARCH=arm \
          GOARM=7 \
          go build -ldflags="-s -w" -o rstaspoof_android_armv7 rstaspoof.go
      
      - name: Verify binary
        run: |
          file rstaspoof_android_armv7
          ls -lh rstaspoof_android_armv7
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rstaspoof_android_armv7
          path: rstaspoof_android_armv7
