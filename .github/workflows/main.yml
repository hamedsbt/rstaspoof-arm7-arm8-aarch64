name: Build for Android ARMv7 (safe patch)
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Download source
        run: |
          wget https://raw.githubusercontent.com/rstagit/rstaspoof/refs/heads/main/rstaspoof.go

      - name: Patch struct alignment
        run: |
          # Move totalPackets to top of PacketMonitor struct
          cp rstaspoof.go rstaspoof.go.bak
          awk '
          /type PacketMonitor struct/ { found=1 }
          found && !done && /totalPackets uint64/ {
              total_line = $0
              next
          }
          found && !done && /^}/ {
              if (total_line != "") print total_line
              done=1
          }
          { print }
          END { if (found && !done && total_line != "") print total_line }
          ' rstaspoof.go.bak > rstaspoof.go
          
          echo "Patched file:"
          grep -A6 "type PacketMonitor struct" rstaspoof.go

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          link-to-sdk: false

      - name: Build
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          export CC=$(find $ANDROID_NDK_HOME -name "armv7a-linux-androideabi*-clang" | head -n 1)
          CGO_ENABLED=1 GOOS=android GOARCH=arm GOARM=7 CC=$CC \
            go build -ldflags="-s -w" -o rstaspoof_android_armv7 rstaspoof.go
          file rstaspoof_android_armv7

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rstaspoof_android_armv7_fixed
          path: rstaspoof_android_armv7
