name: Build for Android ARMv7 (patched)
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Download source
        run: |
          wget https://raw.githubusercontent.com/rstagit/rstaspoof/refs/heads/main/rstaspoof.go

      - name: Patch unaligned atomic field
        run: |
          # Move the uint64 field 'totalPackets' to the top of PacketMonitor struct
          # Original struct definition (around line 165) looks like:
          # type PacketMonitor struct {
          #     packets map[string]*PacketInfo
          #     mu      sync.RWMutex
          #     totalPackets uint64
          # }
          # After patch: totalPackets comes first.
          sed -i '/type PacketMonitor struct/,/^}/ {
              /totalPackets uint64/ { h; d; }
              /^}/ { x; /totalPackets/ { G; } }
          }' rstaspoof.go
          # Simpler approach: use awk to reorder fields
          awk '/type PacketMonitor struct/ {print; getline; print "    totalPackets uint64"; while (getline && !/^}/) {if (!/totalPackets/) print} print "}"; next} 1' rstaspoof.go > tmp && mv tmp rstaspoof.go

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          link-to-sdk: false

      - name: Build
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          export CC=$(find $ANDROID_NDK_HOME -name "armv7a-linux-androideabi*-clang" | head -n 1)
          CGO_ENABLED=1 GOOS=android GOARCH=arm GOARM=7 CC=$CC \
            go build -ldflags="-s -w" -o rstaspoof_android_armv7 rstaspoof.go

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: rstaspoof_android_armv7_fixed
          path: rstaspoof_android_armv7
