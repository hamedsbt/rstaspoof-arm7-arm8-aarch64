name: Build for Android ARMv7
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Download source
        run: |
          wget https://raw.githubusercontent.com/rstagit/rstaspoof/refs/heads/main/rstaspoof.go
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      
      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          link-to-sdk: true
      
      - name: Find and set NDK clang
        run: |
          NDK_PATH=$ANDROID_HOME/ndk-bundle
          # List available clang versions
          echo "Available clang binaries:"
          ls -la $NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin/ | grep "armv7a"
          
          # Use API level 21 (Android 5.0) which is compatible with Android 11
          export CC=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi21-clang
          
          # Make sure it exists
          if [ ! -f "$CC" ]; then
            echo "Trying API level 24 instead..."
            export CC=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi24-clang
          fi
          
          echo "Using compiler: $CC"
          echo "CC=$CC" >> $GITHUB_ENV
      
      - name: Build with external linking
        run: |
          CGO_ENABLED=1 \
          GOOS=android \
          GOARCH=arm \
          GOARM=7 \
          CC=$CC \
          go build -ldflags="-s -w" -o rstaspoof_android_armv7 rstaspoof.go
      
      - name: Verify and strip binary
        run: |
          file rstaspoof_android_armv7
          ls -lh rstaspoof_android_armv7
          # Check if it's statically linked
          ldd rstaspoof_android_armv7 2>&1 || echo "Binary appears static"
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rstaspoof_android_armv7
          path: rstaspoof_android_armv7
